<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>FinanceAI - Personal Finance Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.1.min.js" charset="utf-8"></script>
</head>
<body>
    <!-- Particles Container -->
    <div class="particles"></div>
    
    <div class="stars"></div>
    <div class="twinkling"></div>
    
    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>
    
    <!-- Main Navigation -->
    <nav class="navbar navbar-expand-lg glass-nav fixed-top" id="mainNav">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">
                <i class="fas fa-robot"></i> 
                <span>FinanceAI</span>
            </a>
            
            <button class="navbar-toggler mobile-menu-btn" type="button" id="mobileMenuBtn">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" 
                           href="{{ url_for('dashboard') }}">
                            <i class="fas fa-chart-line"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'transactions_page' %}active{% endif %}" 
                           href="{{ url_for('transactions_page') }}">
                            <i class="fas fa-exchange-alt"></i> Transactions
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'categories_page' %}active{% endif %}" 
                           href="{{ url_for('categories_page') }}">
                            <i class="fas fa-tags"></i> Categories
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'reports_page' %}active{% endif %}" 
                           href="{{ url_for('reports_page') }}">
                            <i class="fas fa-file-alt"></i> Reports
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'predictions_page' %}active{% endif %}" 
                           href="{{ url_for('predictions_page') }}">
                            <i class="fas fa-brain"></i> AI Predictions
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'visualizations_page' %}active{% endif %}" 
                           href="{{ url_for('visualizations_page') }}">
                            <i class="fas fa-chart-bar"></i> Visuals
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'settings_page' %}active{% endif %}" 
                           href="{{ url_for('settings_page') }}">
                            <i class="fas fa-cog"></i> Settings
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Mobile Navigation Menu -->
    <div class="mobile-nav" id="mobileNav">
        <div class="mobile-nav-header">
            <h5>FinanceAI</h5>
            <button class="mobile-nav-close" id="mobileNavClose">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <ul class="mobile-nav-list">
            <li class="mobile-nav-item">
                <a href="{{ url_for('dashboard') }}" onclick="closeMobileMenu()">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="mobile-nav-item">
                <a href="{{ url_for('transactions_page') }}" onclick="closeMobileMenu()">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Transactions</span>
                </a>
            </li>
            <li class="mobile-nav-item">
                <a href="{{ url_for('categories_page') }}" onclick="closeMobileMenu()">
                    <i class="fas fa-tags"></i>
                    <span>Categories</span>
                </a>
            </li>
            <li class="mobile-nav-item">
                <a href="{{ url_for('reports_page') }}" onclick="closeMobileMenu()">
                    <i class="fas fa-file-alt"></i>
                    <span>Reports</span>
                </a>
            </li>
            <li class="mobile-nav-item">
                <a href="{{ url_for('predictions_page') }}" onclick="closeMobileMenu()">
                    <i class="fas fa-brain"></i>
                    <span>AI Predictions</span>
                </a>
            </li>
            <li class="mobile-nav-item">
                <a href="{{ url_for('visualizations_page') }}" onclick="closeMobileMenu()">
                    <i class="fas fa-chart-bar"></i>
                    <span>Visualizations</span>
                </a>
            </li>
            <li class="mobile-nav-item">
                <a href="{{ url_for('settings_page') }}" onclick="closeMobileMenu()">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid mt-4 pt-2">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Back to Top Button -->
    <button id="backToTop" class="back-to-top" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/responsive.js') }}"></script>
    
    <script>
        // Mobile menu functions
        function openMobileMenu() {
            document.getElementById('mobileNav').classList.add('active');
            document.getElementById('mobileMenuOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeMobileMenu() {
            document.getElementById('mobileNav').classList.remove('active');
            document.getElementById('mobileMenuOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        // Event listeners
        document.getElementById('mobileMenuBtn')?.addEventListener('click', openMobileMenu);
        document.getElementById('mobileNavClose')?.addEventListener('click', closeMobileMenu);
        document.getElementById('mobileMenuOverlay')?.addEventListener('click', closeMobileMenu);
        
        // Active link highlighting
        const currentPath = window.location.pathname;
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
